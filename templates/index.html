<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arXiv 论文摘要生成工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #f5f0ff 0%, #ede7f6 100%);
            min-height: 100vh;
            color: #333;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 顶部导航栏 */
        .navbar {
            background: #fff;
            border-bottom: 1px solid #e8e0f0;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #6b5a9a;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .navbar h1::before {
            content: '🔬';
            font-size: 1.2rem;
        }

        /* 主容器 */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        /* 搜索区域 */
        .search-section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #e8e0f0;
            box-shadow: 0 1px 3px rgba(107, 90, 154, 0.05);
        }

        .search-section h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #5a4a7a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px 20px;
            align-items: end;
        }

        .form-row {
            display: contents;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 4;
        }

        .form-group.half-width {
            grid-column: span 2;
        }

        .form-group.third-width {
            grid-column: span 1;
        }

        .form-row-inline {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px 20px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #6b5a9a;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid #e0d8f0;
            border-radius: 8px;
            font-size: 13px;
            background: #faf8ff;
            transition: all 0.2s ease;
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #9c7dd8;
            box-shadow: 0 0 0 3px rgba(156, 125, 216, 0.1);
            background: #fff;
        }

        .form-group input::placeholder {
            color: #b8a8c8;
        }

        .btn-submit {
            background: linear-gradient(135deg, #9c7dd8 0%, #8b6fc9 100%);
            color: #fff;
            border: none;
            padding: 11px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(156, 125, 216, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 进度条 */
        .progress-section {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid #e8e0f0;
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #6b5a9a;
        }

        .progress-bar-container {
            height: 6px;
            background: #f0e8f8;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #9c7dd8, #b89fe8);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* 结果区域 */
        .results-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e0f0;
            margin-bottom: 8px;
        }

        .results-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #5a4a7a;
        }

        .results-count {
            font-size: 0.85rem;
            color: #8a7a9a;
        }

        /* 论文卡片 */
        .paper-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e8e0f0;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .paper-card:hover {
            box-shadow: 0 4px 16px rgba(107, 90, 154, 0.1);
            border-color: #d0c4e8;
        }

        .paper-card.new {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .paper-header {
            background: linear-gradient(135deg, #faf8ff 0%, #f5f0fa 100%);
            padding: 16px 20px;
            border-bottom: 1px solid #e8e0f0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .paper-title {
            font-size: 1rem;
            font-weight: 600;
            color: #4a3a6a;
            line-height: 1.4;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .paper-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .paper-status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .paper-status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .paper-status.error {
            background: #ffebee;
            color: #c62828;
        }

        .paper-content {
            padding: 24px 20px;
            line-height: 1.8;
            color: #444;
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .paper-footer {
            padding: 14px 20px;
            background: #faf8ff;
            border-top: 1px solid #e8e0f0;
            font-size: 0.8rem;
            color: #8a7a9a;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .paper-footer span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #a898b8;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0e8f8;
            border-top-color: #9c7dd8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #8a7a9a;
            font-size: 0.9rem;
        }

        /* 错误状态 */
        .error-box {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #c53030;
            margin: 20px 0;
        }

        .error-box .error-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Markdown 样式 */
        .markdown-content {
            line-height: 1.8;
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .markdown-content h1 {
            font-size: 1.5rem;
            color: #5a4a7a;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e8e0f0;
        }

        .markdown-content h2 {
            font-size: 1.25rem;
            color: #5a4a7a;
            margin: 1.2rem 0 0.8rem;
        }

        .markdown-content h3 {
            font-size: 1.1rem;
            color: #5a4a7a;
            margin: 1rem 0 0.6rem;
        }

        .markdown-content p {
            margin-bottom: 1rem;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }

        .markdown-content li {
            margin-bottom: 0.4rem;
        }

        .markdown-content code {
            background: #f5f0ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: #6b5a9a;
            font-feature-settings: 'liga' 1;
        }

        .markdown-content pre {
            background: #faf8ff;
            border: 1px solid #e8e0f0;
            border-radius: 8px;
            padding: 14px;
            overflow-x: auto;
            margin: 1rem 0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            font-family: inherit;
        }

        .markdown-content blockquote {
            border-left: 3px solid #9c7dd8;
            margin: 1rem 0;
            padding: 10px 16px;
            background: #faf8ff;
            font-style: italic;
            border-radius: 0 6px 6px 0;
        }

        .markdown-content a {
            color: #8b6fc9;
            text-decoration: none;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .markdown-content strong {
            color: #5a4a7a;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1rem 0;
            border-radius: 8px;
            border: 1px solid #e8e0f0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            overflow-x: auto;
            display: block;
        }

        .markdown-content table {
            display: table;
            overflow-x: auto;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid #e8e0f0;
            padding: 10px 12px;
            text-align: left;
        }

        .markdown-content th {
            background: #f5f0ff;
            font-weight: 600;
            color: #5a4a7a;
        }

        .markdown-content tr:nth-child(even) {
            background: #faf8ff;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .search-form {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-group.full-width {
                grid-column: span 2;
            }

            .form-group.half-width {
                grid-column: span 1;
            }

            .form-group.third-width {
                grid-column: span 1;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 12px 16px;
            }

            .main-container {
                padding: 16px;
            }

            .search-form {
                grid-template-columns: 1fr;
            }

            .form-group.full-width,
            .form-group.half-width,
            .form-group.third-width {
                grid-column: span 1;
            }

            .paper-header {
                flex-direction: column;
            }

            .paper-meta {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <h1>arXiv 论文摘要生成工具</h1>
    </nav>

    <div class="main-container">
        <!-- 搜索参数区域 -->
        <section class="search-section">
            <h2><span>📋</span> 搜索参数</h2>
            <form id="searchForm" class="search-form">
                <!-- API 配置区域 -->
                <div class="form-group full-width" style="margin-bottom: 8px;">
                    <label style="color: #8a7a9a; font-size: 0.75rem;">🔌 API 配置</label>
                </div>
                <div class="form-group third-width">
                    <label for="apiBase">🌐 API Base URL</label>
                    <input type="text" id="apiBase" name="apiBase" required placeholder="base url, e.g. https://api.deepseek.com">
                </div>
                <div class="form-group third-width">
                    <label for="apiKey">🔑 API Key</label>
                    <input type="password" id="apiKey" name="apiKey" required placeholder="API Key">
                </div>
                <div class="form-group third-width">
                    <label for="modelName">🤖 模型名称</label>
                    <input type="text" id="modelName" name="modelName" required placeholder="model name, e.g. deepseek-v4-pro">
                </div>

                <!-- 搜索参数区域 -->
                <div class="form-group full-width" style="margin-bottom: 8px; margin-top: 8px;">
                    <label style="color: #8a7a9a; font-size: 0.75rem;">🔎 搜索参数</label>
                </div>
                <div class="form-group third-width">
                    <label for="category">📚 研究领域</label>
                    <select id="category" name="category" required>
                        <option value="">选择领域</option>
                        <option value="cs.CV">计算机视觉（cs.CV）</option>
                        <option value="cs.AI">人工智能（cs.AI）</option>
                        <option value="cs.LG">机器学习（cs.LG）</option>
                        <option value="cs.CL">计算语言学（cs.CL）</option>
                        <option value="cs.RO">机器人学（cs.RO）</option>
                        <option value="stat.ML">统计机器学习（stat.ML）</option>
                        <option value="eess.SY">系统控制（eess.SY）</option>
                    </select>
                </div>
                <div class="form-group third-width">
                    <label for="maxResults">📊 数量</label>
                    <select id="maxResults" name="maxResults">
                        <option value="1">1 篇</option>
                        <option value="5">5 篇</option>
                        <option value="10" selected>10 篇</option>
                        <option value="15">15 篇</option>
                        <option value="20">20 篇</option>
                    </select>
                </div>
                <div class="form-group third-width">
                    <label for="keyword">🔍 关键词</label>
                    <input type="text" id="keyword" name="keyword" required placeholder="emotion, transformer">
                </div>

                <!-- 日期选择 -->
                <div class="form-group full-width" style="margin-bottom: 8px; margin-top: 8px;">
                    <label style="color: #8a7a9a; font-size: 0.75rem;">📅 日期范围</label>
                </div>
                <div class="form-group third-width">
                    <label for="dateFrom">起始日期</label>
                    <input type="date" id="dateFrom" name="dateFrom" required>
                </div>
                <div class="form-group third-width">
                    <label for="dateTo">结束日期</label>
                    <input type="date" id="dateTo" name="dateTo" required>
                </div>

                <!-- 提交按钮 -->
                <div class="form-group full-width" style="margin-top: 16px;">
                    <button type="submit" class="btn-submit" id="searchBtn">
                        🚀 开始分析论文
                    </button>
                </div>
            </form>
        </section>

        <!-- 进度条 -->
        <section class="progress-section" id="progressSection">
            <div class="progress-header">
                <span id="progressMessage">正在处理论文...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
        </section>

        <!-- 结果区域 -->
        <section class="results-section">
            <div class="results-header" id="resultsHeader" style="display: none;">
                <h3>📄 分析结果</h3>
                <span class="results-count" id="resultsCount"></span>
            </div>

            <div id="results">
                <div class="empty-state">
                    <div class="icon">📚</div>
                    <p>请填写搜索参数并点击"开始分析"来获取论文摘要</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 全局变量
        let allPapers = [];
        const STORAGE_KEY = 'arxiv_papers_cache';
        const STORAGE_TIMESTAMP_KEY = 'arxiv_papers_cache_timestamp';
        const CACHE_EXPIRY = 24 * 60 * 60 * 1000; // 24 小时过期

        // 保存到 localStorage
        function saveToStorage(papers) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(papers));
                localStorage.setItem(STORAGE_TIMESTAMP_KEY, Date.now().toString());
            } catch (e) {
                console.error('保存到 localStorage 失败:', e);
            }
        }

        // 从 localStorage 加载
        function loadFromStorage() {
            try {
                const timestamp = localStorage.getItem(STORAGE_TIMESTAMP_KEY);
                const now = Date.now();

                // 检查是否过期
                if (timestamp && (now - parseInt(timestamp)) > CACHE_EXPIRY) {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem(STORAGE_TIMESTAMP_KEY);
                    return null;
                }

                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : null;
            } catch (e) {
                console.error('从 localStorage 加载失败:', e);
                return null;
            }
        }

        // 清除缓存
        function clearStorage() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(STORAGE_TIMESTAMP_KEY);
        }

        // 渲染论文卡片
        function createPaperCard(paper) {
            const card = document.createElement('div');
            card.className = 'paper-card';

            const isSuccess = paper.success && paper.markdown_content;

            card.innerHTML = `
                <div class="paper-header">
                    <div class="paper-title">${paper.title || '未知标题'}</div>
                    <div class="paper-meta">
                        <span class="paper-status ${isSuccess ? 'success' : 'error'}">
                            ${isSuccess ? '✓ 处理成功' : '✗ 处理失败'}
                        </span>
                    </div>
                </div>
                <div class="paper-content">
                    ${isSuccess ? renderMarkdown(paper.markdown_content) :
                        `<div class="error-box">
                            <strong>处理失败:</strong> ${paper.error || '未知错误'}
                        </div>`}
                </div>
                <div class="paper-footer">
                    <span>👥 ${paper.authors ? paper.authors.slice(0, 3).join(', ') + (paper.authors.length > 3 ? ' 等' : '') : '未知'}</span>
                    <span>📅 ${paper.published || '未知'}</span>
                </div>
            `;

            return card;
        }

        // 恢复缓存的数据
        function restoreCachedData() {
            const cachedPapers = loadFromStorage();
            if (cachedPapers && cachedPapers.length > 0) {
                allPapers = cachedPapers;
                const results = document.getElementById("results");
                const resultsHeader = document.getElementById("resultsHeader");
                const resultsCount = document.getElementById("resultsCount");

                results.innerHTML = '';
                cachedPapers.forEach(paper => {
                    const card = createPaperCard(paper);
                    results.appendChild(card);
                });

                resultsHeader.style.display = 'flex';
                resultsCount.textContent = `共 ${cachedPapers.length} 篇`;
            }
        }

        // 配置 marked.js
        marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) {}
                }
                try {
                    return hljs.highlightAuto(code).value;
                } catch (err) {}
                return code;
            }
        });

        // 渲染 Markdown 内容
        function renderMarkdown(content) {
            try {
                if (!content || typeof content !== 'string') {
                    throw new Error('内容为空或格式不正确');
                }
                const html = marked.parse(content);
                return `<div class="markdown-content">${html}</div>`;
            } catch (error) {
                console.error('Markdown 解析失败:', error);
                return `<div class="error-box">Markdown 解析失败</div>`;
            }
        }

        // 显示加载状态
        function showLoading() {
            const results = document.getElementById("results");
            const resultsHeader = document.getElementById("resultsHeader");
            const resultsCount = document.getElementById("resultsCount");
            const progressSection = document.getElementById("progressSection");

            results.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在搜索和分析论文，请稍候...</p>
                </div>
            `;

            resultsHeader.style.display = 'none';
            progressSection.style.display = 'block';
        }

        // 显示错误
        function showError(message) {
            const results = document.getElementById("results");
            const progressSection = document.getElementById("progressSection");

            results.innerHTML = `
                <div class="error-box">
                    <div class="error-icon">❌</div>
                    <strong>出现错误</strong>
                    <p>${message}</p>
                </div>
            `;

            progressSection.style.display = 'none';
        }

        // 流式响应处理
        async function processStream(response) {
            const results = document.getElementById("results");
            const resultsHeader = document.getElementById("resultsHeader");
            const resultsCount = document.getElementById("resultsCount");
            const progressMessage = document.getElementById("progressMessage");
            const progressPercent = document.getElementById("progressPercent");
            const progressBar = document.getElementById("progressBar");

            results.innerHTML = '';
            allPapers = [];

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                let boundary;
                while ((boundary = buffer.indexOf('\n')) !== -1) {
                    const line = buffer.substring(0, boundary).trim();
                    buffer = buffer.substring(boundary + 1);

                    if (!line) continue;

                    try {
                        const event = JSON.parse(line);

                        switch (event.type) {
                            case 'status':
                                progressMessage.textContent = event.message;
                                const percent = Math.round((event.processed / event.total) * 100);
                                progressPercent.textContent = percent + '%';
                                progressBar.style.width = percent + '%';
                                break;

                            case 'paper':
                                allPapers.push(event.data);
                                const card = createPaperCard(event.data);
                                results.appendChild(card);

                                // 平滑滚动到新卡片
                                setTimeout(() => {
                                    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }, 100);

                                resultsCount.textContent = `共 ${allPapers.length} 篇`;

                                // 保存到 localStorage
                                saveToStorage(allPapers);
                                break;

                            case 'complete':
                                progressMessage.textContent = '所有论文处理完成！';
                                progressPercent.textContent = '100%';
                                progressBar.style.width = '100%';

                                setTimeout(() => {
                                    document.getElementById("progressSection").style.display = 'none';
                                }, 1500);
                                break;

                            case 'error':
                                showError(event.message);
                                break;
                        }
                    } catch (e) {
                        console.error('解析事件错误:', e);
                    }
                }
            }

            // 显示结果头部
            if (allPapers.length > 0) {
                resultsHeader.style.display = 'flex';
                resultsCount.textContent = `共 ${allPapers.length} 篇`;
            }
        }

        // 表单提交处理
        document.getElementById("searchForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const data = {
                apiKey: document.getElementById("apiKey").value,
                apiBase: document.getElementById("apiBase").value,
                modelName: document.getElementById("modelName").value,
                category: document.getElementById("category").value,
                keyword: document.getElementById("keyword").value,
                dateFrom: document.getElementById("dateFrom").value,
                dateTo: document.getElementById("dateTo").value,
                maxResults: document.getElementById("maxResults").value
            };

            const btn = document.getElementById("searchBtn");
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerText = "⏳ 分析中...";

            // 清除旧缓存
            clearStorage();
            allPapers = [];

            showLoading();

            try {
                const response = await fetch("/summarize", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                await processStream(response);

            } catch (error) {
                console.error("请求失败:", error);
                showError(error.message || "网络请求失败，请检查网络连接或稍后重试");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const oneWeekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);

            document.getElementById('dateTo').value = today.toISOString().split('T')[0];
            document.getElementById('dateFrom').value = oneWeekAgo.toISOString().split('T')[0];

            // 恢复缓存的数据
            restoreCachedData();
        });
    </script>
</body>
</html>
